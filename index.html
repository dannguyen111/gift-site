            function checkLogin() {
                const name = document.getElementById('name-input').value.trim().toLowerCase();
                // We will use her answer as the decryption key!
                const answer = document.getElementById('answer-input').value.trim().toLowerCase();
                const errorMsg = document.getElementById('error-message');

                                document.getElementById(id).innerHTML = decryptedBytes.toString(CryptoJS.enc.Utf8);
                            }

                            // Hide login, show photos

                            document.getElementById('main-content').style.display = 'block';
                            return; // Exit the function successfully

                    }
